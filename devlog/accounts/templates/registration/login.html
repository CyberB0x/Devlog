{% extends 'blog/base.html' %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h3 class="mb-4 text-center">🔐 Вход по Email</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_email" class="form-label">Email</label>
        <input type="email" name="email" class="form-control" id="id_email" required>
      </div>
      <div class="mb-3">
        <label for="id_password" class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" id="id_password" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Войти</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'forgot_password' %}" class="text-decoration-none">Забыли пароль?</a>
    </div>

    <div class="text-center mt-3">
      Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </div>
  </div>
</div>

{% endblock %}
