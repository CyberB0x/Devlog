{% extends 'blog/base.html' %}
{% block content %}
  <h1>Последние статьи</h1>
  {% for article in articles %}
    <div>
      <h2><a href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h2>
      <p>Автор: {{ article.author }} | Просмотров: {{ article.views }}</p>
      <p>{{ article.content_md|truncatechars:200 }}</p>
    </div>
  {% empty %}
    <p>Статей пока нет.</p>
  {% endfor %}
{% endblock %}
