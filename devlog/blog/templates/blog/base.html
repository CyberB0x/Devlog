<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevLog — Блог Python-разработчика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-profile {
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-body text-body">

<!-- 🔗 Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🧠 DevLog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="navbarMenu">
            <ul class="navbar-nav">
                {% if not user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">🔐 Войти</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">📝 Регистрация</a></li>
                {% endif %}
            </ul>

            {% if user.is_authenticated %}
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item">
                    <a class="btn btn-secondary btn-sm" href="{% url 'home' %}"> Главная</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-success btn-sm" href="{% url 'profile' %}">👤 Профиль</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-primary btn-sm" href="{% url 'add_article' %}">➕ Добавить статью</a>
                </li>
                <li class="nav-item">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">🚪 Выйти</button>
                    </form>
                </li>
                <li class="nav-item">
                    <button id="themeToggle" class="btn btn-outline-light btn-sm">🌙 Тема</button>
                </li>
            </ul>
            {% endif %}
        </div>
    </div>
</nav>

<!-- 📦 Контент -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ☀️🌙 Переключатель тёмной темы
    const themeBtn = document.getElementById("themeToggle");
    const htmlEl = document.documentElement;

    if (themeBtn) {
        themeBtn.addEventListener("click", () => {
            let current = htmlEl.getAttribute("data-bs-theme");
            let next = current === "dark" ? "light" : "dark";
            htmlEl.setAttribute("data-bs-theme", next);
            localStorage.setItem("theme", next);
        });
    }

    // 🧠 Восстановление темы
    const saved = localStorage.getItem("theme");
    if (saved) htmlEl.setAttribute("data-bs-theme", saved);
</script>

</body>
</html>
