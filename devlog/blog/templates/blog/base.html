<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevLog — Блог Python-разработчика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dark-toggle {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-body text-body">

<!-- 🔘 Тёмная тема переключатель -->
<div class="dark-toggle">
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary">🌙 Тема</button>
</div>

<!-- 🔗 Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🧠 DevLog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto">
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">👤 Профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_article' %}">➕ Добавить статью</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">🚪 Выйти</a></li>
                {% else %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">🔐 Войти</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">📝 Регистрация</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<!-- 📦 Контент -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ☀️🌙 Переключатель тёмной темы
    const themeBtn = document.getElementById("themeToggle");
    const htmlEl = document.documentElement;

    themeBtn.addEventListener("click", () => {
        let current = htmlEl.getAttribute("data-bs-theme");
        let next = current === "dark" ? "light" : "dark";
        htmlEl.setAttribute("data-bs-theme", next);
        localStorage.setItem("theme", next);
    });

    // 🧠 Восстановление темы
    const saved = localStorage.getItem("theme");
    if (saved) htmlEl.setAttribute("data-bs-theme", saved);
</script>

</body>
</html>
